<!DOCTYPE html>
<html>
<head>
  <title>Collision Lab Simulation</title>
  <style>
    body { font-family: Arial; text-align: center; }
    canvas { background: #f0f0f0; margin-top: 20px; }
    table { margin: 20px auto; border-collapse: collapse; }
    td, th { border: 1px solid black; padding: 8px; }
  </style>
</head>
<body>

<h2>Collision Lab Simulation</h2>

<label>Mass A: <input type="range" id="massA" min="1" max="10" value="3"></label>
<span id="massAVal">3</span>
<br>

<label>Mass B: <input type="range" id="massB" min="1" max="10" value="7"></label>
<span id="massBVal">7</span>
<br><br>

<button onclick="startSim()">Run Trial</button>
<button onclick="resetTable()">Reset Table</button>

<p id="trialDisplay">Trial: 1</p>

<canvas id="simCanvas" width="600" height="200"></canvas>

<table>
<tr>
  <th>Trial</th>
  <th>Mass A</th>
  <th>Mass B</th>
  <th>Distance A</th>
  <th>Distance B</th>
</tr>
<tbody id="dataTable"></tbody>
</table>

<script>
let canvas = document.getElementById("simCanvas");
let ctx = canvas.getContext("2d");

// Simulation variables
let posA = 100, posB = 500;
let velA = 0, velB = 0;
let massA = 3, massB = 7;
let running = false;
let collided = false;
let distanceA = 0, distanceB = 0;
let trial = 1;

// Slider updates
document.getElementById("massA").oninput = function() {
  massA = parseFloat(this.value);
  document.getElementById("massAVal").innerText = this.value;
};
document.getElementById("massB").oninput = function() {
  massB = parseFloat(this.value);
  document.getElementById("massBVal").innerText = this.value;
};

// Start trial
function startSim() {
  if (running) return;

  posA = 100;
  posB = 500;
  velA = 2;
  velB = -2;
  distanceA = 0;
  distanceB = 0;
  collided = false;

  running = true;
}

// Reset table
function resetTable() {
  document.getElementById("dataTable").innerHTML = "";
  trial = 1;
  document.getElementById("trialDisplay").innerText = "Trial: 1";
}

// Record trial data
function recordData() {
  let row = `<tr>
    <td>${trial}</td>
    <td>${massA}</td>
    <td>${massB}</td>
    <td>${distanceA.toFixed(1)}</td>
    <td>${distanceB.toFixed(1)}</td>
  </tr>`;
  document.getElementById("dataTable").innerHTML += row;
  trial++;
  document.getElementById("trialDisplay").innerText = "Trial: " + trial;
}

// Update physics
function update() {
  if (!running) return;

  // Predict next positions
  let nextPosA = posA + velA;
  let nextPosB = posB + velB;

  // Robust collision detection: did they pass each other this frame?
  if (!collided && nextPosA + 20 >= nextPosB) {
    collided = true;

    // Elastic 1D collision formula
    let newVelA = ((massA - massB) / (massA + massB)) * velA + ((2 * massB) / (massA + massB)) * velB;
    let newVelB = ((2 * massA) / (massA + massB)) * velA + ((massB - massA) / (massA + massB)) * velB;

    velA = newVelA;
    velB = newVelB;

    // Snap positions so blocks just touch
    nextPosA = nextPosB - 20;
  }

  // Apply friction after collision
  if (collided) {
    velA *= 0.99;
    velB *= 0.99;
    distanceA += Math.abs(velA);
    distanceB += Math.abs(velB);
  }

  // Stop simulation when velocities are tiny
  if (collided && Math.abs(velA) < 0.05 && Math.abs(velB) < 0.05) {
    running = false;
    recordData();
  }

  posA = nextPosA;
  posB = nextPosB;
}

// Draw blocks
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = "blue";
  ctx.fillRect(posA, 80, 20, 20);
  ctx.fillStyle = "red";
  ctx.fillRect(posB, 80, 20, 20);
}

// Animation loop
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
